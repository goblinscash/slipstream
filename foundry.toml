[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["lib"]

optimizer = true
optimizer_runs = 200
solc_version = "0.7.6"
evm_version = "cancun"

fs_permissions = [{ access = "read-write", path = "./"}]

no_match_test = "testEchidna"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

[fuzz]
runs = 5000

[rpc_endpoints]
bsc = "${BSC_RPC_URL}"
base_goerli = "${BASE_GOERLI_RPC_URL}"
base = "${BASE_RPC_URL}"

[etherscan]
bsc = { key = "${BSC_SCAN_API_KEY}", url = "${BSC_ETHERSCAN_VERIFIER_URL}" }
base_goerli = { key = "${BASE_GOERLI_ETHERSCAN_API_KEY}", url = "${BASE_GOERLI_ETHERSCAN_VERIFIER_URL}" }
base = { key = "${BASE_ETHERSCAN_API_KEY}", url = "${BASE_ETHERSCAN_VERIFIER_URL}" }